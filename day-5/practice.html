<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>layouts</title>
    <style>     
body{
    display:flex;
    justify-content:center;
    align-items:center;
    background:#988888;
}

.container{
    width:200px;
    padding:15px;
    display:grid;
    grid-template-columns:repeat(4,1fr);
}

/* Row 1 */
.child1{
    grid-column:1 / 3;
    background-color:white;
}

.child2{
    grid-column:3 / 4;
    background-color:tomato;
}

.child3{
    grid-column:4 / 5;
    background-color:green;
}

/* Row 2 */
.child4{
    grid-column:1 / 2;
    background-color:blue;
}

.child5{
    grid-column:2 / 5;
    background-color:purple;
}

/* Row 3 */
.child6{
    grid-column:1 / 2;
    background-color:red;
}

.child7{
    grid-column:2 / 3;
    background-color:orange;
}

.child8{
    grid-column:3 / 5;
    background-color:yellow;
}

.box{
    border:2px solid black;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:30px;
    font-weight:bold;
    background:white;
}
    </style>
</head>
<body>

<div class="container">
    <div class="child1">1</div>
    <div class="child2">2</div>
    <div class="child3">3</div>

    <div class="child4">4</div>
    <div class="child5">5</div>

    <div class="child6">6</div>
    <div class="child7">7</div>
    <div class="child8">8</div>
</div>

</body>
</html>
