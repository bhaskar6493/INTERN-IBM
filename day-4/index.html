<html>
    <head>
        <title>My Page</title>
    <style>
        .div {
            border: 10px solid #000;
            padding: 20px;
            border-radius: 50%;
            text-align: center;
            background-color: #bd6666;
        }
        #container {
            border: 10px solid #d3a5a5;
            flex-wrap: wrap;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 20px;
            margin-top: auto;
            padding: 100px;
            border-radius: 10%;
            text-align: center;
            background-color: #a8a2a2;
        }
        .child {
            border: 5px solid #0e0303;
            border-radius: 30%;
            height: 300px;
            width: 200px;
            margin: auto;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #8b7f7f;
            padding: 30px;
            box-shadow: rgb(38, 57, 77) 0px 20px 30px -10px;
        }
        </style>
    </head>
    <body>
        <div id="container">
            <div class="child">child 1</div> 
            <div class="child">child 2</div> 
            <div class="child">child 3</div> 
            <div class="child">child 4</div> 
            <div class="child">child 5</div> 
            <div class="child">child 6</div> 
        </div>
    </body>
</html>
